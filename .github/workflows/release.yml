name: Create WordPress Plugin Release

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies (including dev)
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: ./vendor/bin/pest --verbose --colors=always

  build:
    name: Build and Upload Release Asset
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: write  # Required to upload release assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Get plugin slug
        id: slug
        run: |
          PLUGIN_SLUG=$(basename $(pwd))
          echo "slug=${PLUGIN_SLUG}" >> $GITHUB_OUTPUT
          echo "Plugin slug: ${PLUGIN_SLUG}"

      - name: Update version in plugin file
        run: |
          set -euo pipefail

          # Extract version from tag (remove "v" prefix if present)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: ${VERSION}"

          # Use '|' as sed delimiter so slashes in VERSION won't break the substitution
          sed -i "s|{{VERSION}}|${VERSION}|g" wp-block-template-sync.php

          # Show the top of the plugin file for debugging
          echo "--- plugin file head ---"
          sed -n '1,40p' wp-block-template-sync.php
          echo "------------------------"

          # Verify both the plugin header and the constant were updated (fixed-string match)
          if ! grep -Fq "Version: ${VERSION}" wp-block-template-sync.php; then
            echo "ERROR: plugin header Version was not updated to ${VERSION}"
            exit 1
          fi

          if ! grep -Fq "define( 'WP_BLOCK_TEMPLATE_SYNC_VERSION', '${VERSION}' );" wp-block-template-sync.php; then
            echo "ERROR: WP_BLOCK_TEMPLATE_SYNC_VERSION constant was not updated to ${VERSION}"
            exit 1
          fi

          # Update POT template placeholder (lowercase) with the same VERSION
          sed -i "s|{{VERSION}}|${VERSION}|g" languages/wp-block-template-sync.pot

          # Show the top of the POT file for debugging
          echo "--- POT file head ---"
          sed -n '1,40p' languages/wp-block-template-sync.pot
          echo "---------------------"


      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="${{ steps.slug.outputs.slug }}"

          # Create temporary directory for the plugin
          mkdir -p /tmp/plugin-build/${PLUGIN_SLUG}

          # Copy all files
          rsync -av --progress . /tmp/plugin-build/${PLUGIN_SLUG}/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.circleci' \
            --exclude='.babelrc' \
            --exclude='.deployignore' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='.eslintignore' \
            --exclude='.eslintrc' \
            --exclude='.gitignore' \
            --exclude='.gitlab-ci.yml' \
            --exclude='.travis.yml' \
            --exclude='.DS_Store' \
            --exclude='.*~' \
            --exclude='Thumbs.db' \
            --exclude='behat.yml' \
            --exclude='bitbucket-pipelines.yml' \
            --exclude='bin' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='dependencies.yml' \
            --exclude='Gruntfile.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='multisite.xml' \
            --exclude='multisite.xml.dist' \
            --exclude='.phpcs.xml' \
            --exclude='phpcs.xml' \
            --exclude='.phpcs.xml.dist' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpcs.dist.xml' \
            --exclude='build.xml' \
            --exclude='README.md' \
            --exclude='webpack.config.js' \
            --exclude='wp-cli.local.yml' \
            --exclude='yarn.lock' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='*.sql' \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            --exclude='manifest.json' \
            --exclude='vendor' \
            --exclude='.phpunit.result.cache'

          # Create zip file
          cd /tmp/plugin-build
          zip -r ${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}

          # Move zip to workspace
          mv ${PLUGIN_SLUG}.zip ${GITHUB_WORKSPACE}/

          echo "Created ${PLUGIN_SLUG}.zip"
          ls -lh ${GITHUB_WORKSPACE}/${PLUGIN_SLUG}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.slug.outputs.slug }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
