name: Create WordPress Plugin Release

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies (including dev)
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: ./vendor/bin/pest --colors=always

  build:
    name: Build and Upload Release Asset
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: write  # Required to upload release assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Get plugin slug
        id: slug
        run: |
          PLUGIN_SLUG=$(basename $(pwd))
          echo "slug=${PLUGIN_SLUG}" >> $GITHUB_OUTPUT
          echo "Plugin slug: ${PLUGIN_SLUG}"

      - name: Update version in plugin file
        run: |
          set -euo pipefail

          # Extract version from tag (remove "v" prefix if present)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: ${VERSION}"

          # Use '|' as sed delimiter so slashes in VERSION won't break the substitution
          sed -i "s|{{VERSION}}|${VERSION}|g" ${{steps.slug.outputs.slug}}.php

          # Show the top of the plugin file for debugging
          echo "--- plugin file head ---"
          sed -n '1,15p' ${{steps.slug.outputs.slug}}.php
          echo "------------------------"

          # Verify both the plugin header and the constant were updated (fixed-string match)
          if ! grep -Fq "Version: ${VERSION}" ${{steps.slug.outputs.slug}}.php; then
            echo "ERROR: plugin header Version was not updated to ${VERSION}"
            exit 1
          fi

          if ! grep -Fq "define( 'WP_BLOCK_TEMPLATE_SYNC_VERSION', '${VERSION}' );" wp-block-template-sync.php; then
            echo "ERROR: WP_BLOCK_TEMPLATE_SYNC_VERSION constant was not updated to ${VERSION}"
            exit 1
          fi

          # Update POT template placeholder (lowercase) with the same VERSION
          sed -i "s|{{VERSION}}|${VERSION}|g" languages/${{steps.slug.outputs.slug}}.pot

          # Show the top of the POT file for debugging
          echo "--- POT file head ---"
          sed -n '1,40p' languages/wp-block-template-sync.pot
          echo "---------------------"


      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="${{ steps.slug.outputs.slug }}"

          # Create temporary directory for the plugin
          mkdir -p /tmp/plugin-build/${PLUGIN_SLUG}

          # Copy all files, excluding patterns listed in .distignore
          rsync -av --progress . /tmp/plugin-build/${PLUGIN_SLUG}/ \
            --exclude-from='.distignore'

          # Create zip file
          cd /tmp/plugin-build
          zip -r ${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}

          # Move zip to workspace
          mv ${PLUGIN_SLUG}.zip ${GITHUB_WORKSPACE}/

          echo "Created ${PLUGIN_SLUG}.zip"
          ls -lh ${GITHUB_WORKSPACE}/${PLUGIN_SLUG}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.slug.outputs.slug }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
